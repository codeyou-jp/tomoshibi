<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>灯 - あなたの夢を照らすAIコーチ</title>
    <meta name="description" content="夢に向かって進むためのAIコーチアプリ。あなたの夢を聞いて、毎日のTodoを一緒に作ります。" />
    <!-- OGP（LINE・Twitter・Facebookシェア用） -->
    <meta property="og:title" content="灯 - あなたの夢を照らすAIコーチ" />
    <meta property="og:description" content="夢に向かって進むためのAIコーチアプリ。あなたの夢を聞いて、毎日のTodoを一緒に作ります。" />
    <meta property="og:url" content="https://tomoshibi.codeyou.link" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://tomoshibi.codeyou.link/favicon.ico" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="灯 - あなたの夢を照らすAIコーチ" />
    <meta name="twitter:description" content="夢に向かって進むためのAIコーチアプリ。" />
    <style id="expo-reset">
      html, body {
        height: 100%;
        touch-action: pan-y;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }
      /* 100dvh = キーボードが出ても動的に追従する高さ */
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
      }
    </style>
  <script>
    // iOS Safari は user-scalable=no を無視するので JS で防ぐ
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend',    function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) { e.preventDefault(); }
    }, { passive: false });
  </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
